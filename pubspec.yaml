name: true_hadith
description: A Flutter app for verifying hadith authenticity using AI-powered technology.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Authentication
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  firebase_storage: ^13.0.5

  # HTTP client for API calls
  http: ^1.1.0

  # Image handling
  image_picker: ^1.1.2
  crop_your_image: ^2.0.0
  image: ^4.1.3  # For image preprocessing (OCR enhancement)
  
  # OCR for text extraction from images
  tesseract_ocr: ^0.5.0  # Upgraded to fix JSON parsing bug

  # UI and utilities
  cupertino_icons: ^1.0.6
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  
  # File and audio handling
  file_picker: ^8.1.2
  permission_handler: ^11.3.1
  audioplayers: ^5.2.1
  path_provider: ^2.1.2
  just_audio: ^0.9.36  # For audio trimming without FFmpeg
  
  # Speech recognition
  speech_to_text: ^7.0.0
  
  # Cryptography for hashing
  crypto: ^3.0.3
  
  # Deep linking for password reset
  app_links: ^6.3.1

  # Share content
  share_plus: ^10.1.4
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  
  # Tesseract OCR language data files
  # Download from: https://github.com/tesseract-ocr/tessdata
  # Place in assets/tessdata/ folder
  # NOTE: Only English is used - Arabic/Urdu handled by EasyOCR backend
  assets:
    - assets/tessdata_config.json      # CRITICAL: Package expects this at ROOT of assets (not in subfolder)
    - assets/tessdata/eng.traineddata  # English language file (explicit path for our code)
    # - assets/tessdata/ara.traineddata  # REMOVED: Use EasyOCR for Arabic
    # - assets/tessdata/urd.traineddata  # REMOVED: Use EasyOCR for Urdu

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false

flutter_native_splash:
  color: "#0B3B30"
  color_dark: "#0B3B30"
  fullscreen: true
  android_12:
    color: "#0B3B30"
    icon_background_color: "#0B3B30"
    color_dark: "#0B3B30"
    icon_background_color_dark: "#0B3B30"

